services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quantclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quantclaw}
      POSTGRES_DB: ${POSTGRES_DB:-quantclaw}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quantclaw}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G

  quantclaw:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-quantclaw}:${POSTGRES_PASSWORD:-quantclaw}@postgres:5432/${POSTGRES_DB:-quantclaw}
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
      BASE_URL: ${BASE_URL:-https://quant.azhefuye.online}
    deploy:
      resources:
        limits:
          cpus: "1.3"
          memory: 2560M

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - quantclaw
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 128M

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  pg-data:
