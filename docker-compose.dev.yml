services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quantclaw
      POSTGRES_PASSWORD: quantclaw
      POSTGRES_DB: quantclaw
    ports:
      - "5432:5432"
    volumes:
      - pg-data-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantclaw"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg-data-dev:
